[build]
  base = "site"
  command = "npm install && npm run build"
  publish = "dist"
  # Toujours rebuilder : le site dépend du corpus dans ../magisterium/ qui
  # est hors du base directory. Sans cette directive, Netlify skip le build
  # dès qu'aucun fichier ne change dans site/.
  ignore = "/bin/false"

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/pagefind/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
